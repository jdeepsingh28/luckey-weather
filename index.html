<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>LW Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --panel-bg: #111111;
      --border: #2a2a2a;
      --amber: #ffb000;
      --green: #00ff41;
      --red: #ff3333;
      --dim: #555555;
      --text: #cccccc;
      --white: #ffffff;
    }

    body {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-bg);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 2px;
    }

    .header-right {
      font-size: 11px;
      color: var(--dim);
      text-align: right;
    }

    .header-right .label { color: var(--dim); }
    .header-right .date { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: 1fr 1fr 0.7fr auto;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
      height: calc(100vh - 49px);
    }

    .panel {
      border: 1px solid var(--border);
      padding: 16px 20px;
      background: var(--panel-bg);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--amber);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .metrics-panel {
      grid-row: 1 / 3;
      grid-column: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    .metric-block {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .metric-block:last-child { border-bottom: none; }

    .metric-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
    }

    .metric-value.positive { color: var(--green); }
    .metric-value.negative { color: var(--red); }
    .metric-value.amber { color: var(--amber); }

    .metric-sub {
      font-size: 11px;
      color: var(--dim);
      margin-top: 4px;
    }

    .metric-sub .highlight { color: var(--amber); }

    .equity-panel {
      grid-row: 1;
      grid-column: 1;
    }

    .pnl-panel {
      grid-row: 2;
      grid-column: 1;
    }

    .chart-container {
      position: relative;
      height: calc(100% - 40px);
    }

    .map-panel {
      grid-row: 3;
      grid-column: 1 / 3;
    }

    .map-container {
      position: relative;
      height: calc(100% - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-container svg {
      height: 100%;
      max-width: 100%;
    }

    .map-container svg text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .map-dot {
      filter: drop-shadow(0 0 4px currentColor);
    }

    .footer {
      grid-column: 1 / 3;
      padding: 6px 20px;
      border-top: 1px solid var(--border);
      font-size: 9px;
      color: #333333;
      background: var(--panel-bg);
      text-align: right;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto 300px 300px 200px auto;
        height: auto;
      }
      .metrics-panel {
        grid-row: 1;
        grid-column: 1;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .metric-block {
        flex: 1;
        min-width: 140px;
        border-right: 1px solid var(--border);
      }
      .equity-panel { grid-row: 2; }
      .pnl-panel { grid-row: 3; }
      .map-panel { grid-row: 4; grid-column: 1; }
      .footer { grid-column: 1; }
      .metric-value { font-size: 24px; }
      .chart-container { height: 240px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">LW TERMINAL</span>
    </div>
    <div class="header-right">
      <span class="label">Last Updated</span><br>
      <span class="date" id="header-date"></span><br>
      <span class="label">Next Update</span><br>
      <span class="date" id="next-update"></span>
    </div>
  </div>

  <div class="grid">
    <div class="panel equity-panel">
      <div class="panel-title">Cumulative Return %</div>
      <div class="chart-container">
        <canvas id="equityChart"></canvas>
      </div>
    </div>

    <div class="panel pnl-panel">
      <div class="panel-title">Daily Return %</div>
      <div class="chart-container">
        <canvas id="pnlChart"></canvas>
      </div>
    </div>

    <div class="panel metrics-panel">
      <div class="metric-block">
        <div class="metric-label">Cumulative Return</div>
        <div class="metric-value positive" id="m-return"></div>
        <div class="metric-sub">since inception <span class="highlight" id="m-daily-avg"></span></div>
      </div>
      <div class="metric-block">
        <div class="metric-label">Win Rate</div>
        <div class="metric-value" id="m-winrate"></div>
        <div class="metric-sub">all closed positions</div>
      </div>
      <div class="metric-block">
        <div class="metric-label">Profit Factor</div>
        <div class="metric-value amber" id="m-pf"></div>
        <div class="metric-sub">gross wins / gross losses</div>
      </div>
      <div class="metric-block">
        <div class="metric-label">Active Markets</div>
        <div class="metric-value" id="m-markets"></div>
        <div class="metric-sub">US cities</div>
      </div>
    </div>

    <div class="panel map-panel">
      <div class="panel-title">City P&L — <span id="map-date"></span></div>
      <div class="map-container">
        <svg id="cityMap" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>

    <div class="footer">
      Kalshi temperature markets
    </div>
  </div>

  <script>
    Chart.defaults.color = '#555555';
    Chart.defaults.borderColor = '#2a2a2a';
    Chart.defaults.font.family = "'IBM Plex Mono', monospace";
    Chart.defaults.font.size = 10;

    async function loadData() {
      try {
        var resp = await fetch('https://storage.googleapis.com/kalshi-dashboard-public/data.json?' + Date.now());
        return await resp.json();
      } catch (e) {
        console.error('Failed to load data.json', e);
        return null;
      }
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDateTime(isoStr) {
      var d = isoStr.includes('T') ? new Date(isoStr) : new Date(isoStr + 'T12:00:00');
      var dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
      if (isoStr.includes('T')) {
        var timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'America/New_York' }) + ' ET';
        return dateStr + ' ' + timeStr;
      }
      return dateStr;
    }

    function render(data) {
      document.getElementById('header-date').textContent = formatDateTime(data.last_updated);

      var m = data.metrics;
      var lastEquity = data.equity_curve[data.equity_curve.length - 1];
      var returnVal = lastEquity.cumulative_pct;
      var returnEl = document.getElementById('m-return');
      returnEl.textContent = (returnVal >= 0 ? '+' : '') + returnVal.toFixed(1) + '%';
      returnEl.className = 'metric-value ' + (returnVal >= 0 ? 'positive' : 'negative');

      // Daily average return
      if (m.daily_avg_return !== undefined) {
        var avg = m.daily_avg_return;
        document.getElementById('m-daily-avg').textContent =
          '| avg ' + (avg >= 0 ? '+' : '') + avg.toFixed(2) + '%/day';
      }

      if (m.win_rate !== undefined) {
        document.getElementById('m-winrate').textContent = m.win_rate.toFixed(1) + '%';
      }

      if (m.profit_factor !== undefined) {
        document.getElementById('m-pf').textContent = m.profit_factor.toFixed(2) + 'x';
      }

      document.getElementById('m-markets').textContent = m.active_markets;

      // Next update time
      if (data.next_update) {
        document.getElementById('next-update').textContent = formatDateTime(data.next_update);
      }

      // Equity curve
      new Chart(document.getElementById('equityChart'), {
        type: 'line',
        data: {
          labels: data.equity_curve.map(function(p) { return formatDate(p.date); }),
          datasets: [{
            data: data.equity_curve.map(function(p) { return p.cumulative_pct; }),
            segment: {
              borderColor: function(ctx) {
                return (ctx.p0.parsed.y < 0 && ctx.p1.parsed.y < 0) ? '#ff3333' : '#00ff41';
              },
              backgroundColor: function(ctx) {
                return (ctx.p0.parsed.y < 0 && ctx.p1.parsed.y < 0)
                  ? 'rgba(255, 51, 51, 0.08)' : 'rgba(0, 255, 65, 0.08)';
              }
            },
            borderColor: '#00ff41',
            backgroundColor: 'rgba(0, 255, 65, 0.08)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: data.equity_curve.map(function(p) {
              return p.cumulative_pct >= 0 ? '#00ff41' : '#ff3333';
            }),
            pointBorderColor: data.equity_curve.map(function(p) {
              return p.cumulative_pct >= 0 ? '#00ff41' : '#ff3333';
            }),
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a1a',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              titleColor: '#ffb000',
              bodyColor: '#ffffff',
              callbacks: {
                label: function(ctx) { return (ctx.parsed.y >= 0 ? '+' : '') + ctx.parsed.y.toFixed(1) + '%'; }
              }
            }
          },
          scales: {
            x: {
              grid: { color: '#1a1a1a' },
              ticks: { color: '#555555' }
            },
            y: {
              grid: { color: '#1a1a1a' },
              ticks: {
                color: '#555555',
                callback: function(v) { return (v >= 0 ? '+' : '') + v + '%'; }
              }
            }
          }
        }
      });

      // City P&L map
      if (data.city_pnl && data.city_pnl.cities) {
        document.getElementById('map-date').textContent = formatDate(data.city_pnl.date);
        renderCityMap(data.city_pnl.cities);
      }

      // Daily P&L bars
      var pnlData = data.daily_pnl.map(function(p) { return p.pct; });
      var pnlColors = pnlData.map(function(v) { return v >= 0 ? '#00ff41' : '#ff3333'; });

      new Chart(document.getElementById('pnlChart'), {
        type: 'bar',
        data: {
          labels: data.daily_pnl.map(function(p) { return formatDate(p.date); }),
          datasets: [{
            data: pnlData,
            backgroundColor: pnlColors,
            borderColor: pnlColors,
            borderWidth: 1,
            borderRadius: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a1a',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              titleColor: '#ffb000',
              bodyColor: '#ffffff',
              callbacks: {
                label: function(ctx) { return (ctx.parsed.y >= 0 ? '+' : '') + ctx.parsed.y.toFixed(1) + '%'; }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#555555' }
            },
            y: {
              grid: { color: '#1a1a1a' },
              ticks: {
                color: '#555555',
                callback: function(v) { return (v >= 0 ? '+' : '') + v + '%'; }
              }
            }
          }
        }
      });
    }

    function renderCityMap(cities) {
      var svg = document.getElementById('cityMap');
      // Clear previous
      svg.innerHTML = '';

      // Simple equirectangular projection for contiguous US
      // lon: -125 to -65 -> x: 40 to 760  (with padding)
      // lat: 24 to 50 -> y: 370 to 30  (inverted, with padding)
      function project(lat, lon) {
        var x = 40 + (lon + 125) / 60 * 720;
        var y = 30 + (50 - lat) / 26 * 340;
        return [x, y];
      }

      // Simplified US continental outline
      var outlinePoints = [
        [48.3,-124.7],[48.2,-123.3],[48.8,-123.0],[48.4,-122.5],[47.9,-122.8],
        [46.3,-124.1],[43.4,-124.4],[42.0,-124.3],[40.0,-124.3],[38.5,-123.1],
        [37.8,-122.5],[36.8,-121.8],[35.5,-121.0],[34.5,-120.5],[33.9,-118.4],
        [32.5,-117.1],[32.5,-114.7],[31.3,-111.0],[31.3,-108.2],[31.8,-106.5],
        [29.5,-104.4],[29.5,-103.0],[27.8,-99.5],[26.0,-97.2],[27.5,-97.0],
        [28.5,-96.0],[29.0,-95.0],[29.7,-93.8],[29.3,-89.6],[30.0,-89.0],
        [30.2,-88.0],[30.3,-86.5],[29.9,-85.0],[29.0,-83.5],[27.0,-82.5],
        [25.5,-80.3],[25.8,-80.0],[27.0,-80.0],[28.5,-80.5],[30.5,-81.4],
        [31.2,-81.1],[32.0,-80.8],[33.5,-78.5],[34.7,-76.5],[35.2,-75.5],
        [36.0,-75.7],[37.0,-76.0],[37.8,-75.5],[38.5,-75.1],[39.5,-74.3],
        [40.5,-74.0],[40.7,-73.9],[41.0,-72.0],[41.5,-71.0],[42.0,-70.0],
        [42.5,-70.5],[43.5,-70.2],[44.5,-67.0],[45.0,-67.0],[47.0,-67.8],
        [47.3,-68.3],[47.2,-69.0],[45.0,-71.0],[45.0,-73.3],[44.8,-74.8],
        [43.6,-76.2],[43.2,-79.0],[42.5,-79.8],[42.0,-80.5],[41.7,-82.5],
        [41.7,-83.5],[42.3,-83.0],[43.0,-82.4],[44.8,-83.5],[45.8,-84.7],
        [46.0,-84.1],[46.5,-84.5],[46.5,-85.0],[47.0,-86.5],[47.3,-88.0],
        [46.8,-89.5],[46.8,-90.8],[47.0,-91.5],[48.0,-89.5],[48.5,-88.0],
        [49.0,-95.1],[49.0,-104.0],[49.0,-116.0],[49.0,-123.0],[48.3,-124.7]
      ];

      var pathD = outlinePoints.map(function(p, i) {
        var xy = project(p[0], p[1]);
        return (i === 0 ? 'M' : 'L') + xy[0].toFixed(1) + ',' + xy[1].toFixed(1);
      }).join(' ') + ' Z';

      var outline = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      outline.setAttribute('d', pathD);
      outline.setAttribute('fill', '#1a1a1a');
      outline.setAttribute('stroke', '#2a2a2a');
      outline.setAttribute('stroke-width', '1.5');
      svg.appendChild(outline);

      // Label offsets to avoid overlap (NE corridor, TX cluster)
      var labelOffset = {
        'NY': [12, -4], 'PHIL': [12, 10], 'DC': [-4, 16],
        'CHI': [12, 4], 'MIA': [12, 4], 'LAX': [12, 4],
        'AUS': [12, 10], 'DEN': [12, 4], 'ATL': [12, 4],
        'OKC': [-4, -10], 'DAL': [12, 4], 'SFO': [12, -4],
        'SEA': [12, 4]
      };

      cities.forEach(function(c) {
        var pos = project(c.lat, c.lon);
        var color = c.pnl_pct > 0 ? '#00ff41' : (c.pnl_pct < 0 ? '#ff3333' : '#555555');
        var off = labelOffset[c.city] || [12, 4];
        var anchor = off[0] < 0 ? 'end' : 'start';

        // Glow circle (larger, transparent)
        var glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        glow.setAttribute('cx', pos[0]);
        glow.setAttribute('cy', pos[1]);
        glow.setAttribute('r', '10');
        glow.setAttribute('fill', color);
        glow.setAttribute('opacity', '0.15');
        svg.appendChild(glow);

        // Dot
        var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', pos[0]);
        dot.setAttribute('cy', pos[1]);
        dot.setAttribute('r', '5');
        dot.setAttribute('fill', color);
        dot.setAttribute('class', 'map-dot');
        svg.appendChild(dot);

        // Label
        var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', pos[0] + off[0]);
        label.setAttribute('y', pos[1] + off[1]);
        label.setAttribute('fill', color);
        label.setAttribute('text-anchor', anchor);
        label.textContent = c.city;
        svg.appendChild(label);

        // P&L value below label
        var pnlLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        pnlLabel.setAttribute('x', pos[0] + off[0]);
        pnlLabel.setAttribute('y', pos[1] + off[1] + 11);
        pnlLabel.setAttribute('fill', color);
        pnlLabel.setAttribute('opacity', '0.6');
        pnlLabel.setAttribute('text-anchor', anchor);
        pnlLabel.setAttribute('style', 'font-size: 8px;');
        pnlLabel.textContent = (c.pnl_pct >= 0 ? '+' : '') + c.pnl_pct.toFixed(1) + '%';
        svg.appendChild(pnlLabel);
      });
    }

    loadData().then(function(data) { if (data) render(data); });
  </script>
</body>
</html>
